<!DOCTYPE HTML>
<html>
	<head>
		<title>Plus Mortgage Group | Licensed Mortgage Banker in 26 States</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* 헤더 전체 레이아웃: 로고와 메뉴를 위아래로 분리 */
			#header {
				padding: 40px 0 0 0 !important;
				background: #fff;
			}

			#header .container {
				display: flex !important;
				flex-direction: column !important; /* 위아래 수직 배치 */
				align-items: flex-start !important; /* 왼쪽 정렬 */
				max-width: 1200px !important;
				margin: 0 auto !important;
				width: 90% !important;
			}

			/* 로고 구역 */
			.logo-area {
				margin-bottom: 20px !important;
			}

			#logo { margin: 0 0 5px 0 !important; border: 0 !important; padding: 0 !important; }
			#logo img { max-width: 260px !important; height: auto !important; display: block; }

			.header-slogan {
				font-size: 1.1em !important;
				color: #333333 !important;
				font-weight: 800 !important;
				text-transform: uppercase !important;
				margin: 0 !important;
				letter-spacing: 0.5px;
			}

			/* 메뉴 구역: 로고 아래에 한 줄로 독립 배치 */
			#nav {
				width: 100% !important;
				margin: 0 !important;
				padding: 15px 0 !important;
				border-top: 1px solid #eee !important; /* 구분선으로 깔끔하게 */
				border-bottom: 1px solid #eee !important;
				background: #fdfdfd !important;
			}

			#nav > ul {
				display: flex !important;
				justify-content: flex-start !important;
				list-style: none !important;
				margin: 0 !important;
				padding: 0 !important;
			}

			#nav > ul > li {
				margin-right: 40px !important; /* 메뉴 글자 사이 간격 */
				padding: 0 !important;
			}

			#nav > ul > li > a {
				color: #555 !important;
				font-weight: 700 !important;
				text-decoration: none !important;
				font-size: 0.95em !important;
				text-transform: uppercase;
				transition: color 0.2s;
			}

			#nav > ul > li > a:hover { color: #ed786a !important; }

			/* 모바일 대응 */
			@media screen and (max-width: 980px) {
				#nav > ul { justify-content: center !important; }
				#nav > ul > li { margin: 0 15px !important; }
			}
		</style>
	</head>
	<body class="homepage is-preload">
		<div id="page-wrapper">

			<section id="header">
					<div class="container">
						<div class="logo-area">
							<h1 id="logo">
								<a href="index.html"><img src="images/logo_top.jpg" alt="Plus Mortgage Group"></a>
							</h1>
							<p class="header-slogan">Licensed Mortgage Banker in 26 States</p>
						</div>

						<nav id="nav">
							<ul>
								<li><a href="index.html">Home</a></li>
								<li><a href="#features">Programs</a></li>
								<li><a href="#main">Services</a></li>
								<li><a href="#footer">Contact Us</a></li>
							</ul>
						</nav>
					</div>
				</section>

			<section id="footer">
					<div class="container">
						<div class="row">
							<div class="col-6 col-12-medium">
								<section>
									<form action="https://formspree.io/f/david@plusmtg.com" method="POST">
										<div class="row gtr-50">
											<div class="col-6 col-12-small"><input name="name" placeholder="Name" type="text" required /></div>
											<div class="col-6 col-12-small"><input name="email" placeholder="Email" type="email" required /></div>
											<div class="col-12"><textarea name="message" placeholder="Message" rows="4" required></textarea></div>
											<div class="col-12">
												<button type="submit" class="button icon solid fa-envelope">Send Message</button>
											</div>
										</div>
									</form>
								</section>
							</div>
                            </div>
					</div>
				</section>
		</div>
	</body>
</html>
