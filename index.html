<!DOCTYPE HTML>
<html>
	<head>
		<title>Plus Mortgage Group | Licensed Mortgage Banker in 26 States</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* 헤더 전체 레이아웃 */
			#header {
				padding: 30px 0 10px 0 !important;
				position: relative;
			}

			#header .container {
				display: flex !important;
				justify-content: space-between !important; /* 좌우 끝으로 벌리기 */
				align-items: flex-start !important;
				max-width: 1200px !important;
				margin: 0 auto !important;
				position: relative;
			}

			/* 왼쪽 구역: 로고와 슬로건 */
			.logo-area {
				display: flex;
				flex-direction: column;
				align-items: flex-start;
				z-index: 2;
			}

			#logo { margin: 0 0 10px 0 !important; border: 0 !important; }
			#logo img { max-width: 240px !important; height: auto !important; }

			.header-slogan {
				font-size: 1.15em !important;
				color: #333333 !important;
				font-weight: 800 !important;
				text-transform: uppercase !important;
				margin: 0 !important;
				letter-spacing: 1px;
			}

			/* 오른쪽 구역: 메뉴를 상단으로 강제 이동 */
			#nav {
				position: absolute !important;
				right: 0 !important;
				top: 10px !important; /* 로고와 비슷한 높이로 올림 */
				margin: 0 !important;
				padding: 0 !important;
				background: none !important;
				box-shadow: none !important;
				border: none !important;
			}

			#nav > ul {
				display: flex !important;
				flex-direction: row !important;
				list-style: none !important;
				margin: 0 !important;
				padding: 0 !important;
			}

			#nav > ul > li {
				margin-left: 30px !important; /* 메뉴 사이 간격 */
				padding: 0 !important;
			}

			#nav > ul > li > a {
				color: #555 !important;
				font-weight: 700 !important;
				text-decoration: none !important;
				font-size: 0.9em !important;
				text-transform: uppercase;
			}

			#nav > ul > li > a:hover {
				color: #ed786a !important;
			}

			/* 모바일 대응 */
			@media screen and (max-width: 980px) {
				#header .container {
					flex-direction: column !important;
					align-items: center !important;
				}
				#nav {
					position: relative !important;
					top: 0 !important;
					margin-top: 20px !important;
				}
				#nav > ul { justify-content: center !important; }
			}
		</style>
	</head>
	<body class="homepage is-preload">
		<div id="page-wrapper">

			<section id="header">
					<div class="container">

						<div class="logo-area">
							<h1 id="logo">
								<a href="index.html"><img src="images/logo_top.jpg" alt="Plus Mortgage Group"></a>
							</h1>
							<p class="header-slogan">Licensed Mortgage Banker in 26 States</p>
						</div>

						<nav id="nav">
							<ul>
								<li><a href="index.html">Home</a></li>
								<li><a href="#features">Programs</a></li>
								<li><a href="#main">Services</a></li>
								<li><a href="#footer">Contact Us</a></li>
							</ul>
						</nav>

					</div>
				</section>

			</div>
	</body>
</html>
